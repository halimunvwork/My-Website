name: CI — Lint & Format Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

  notify:
    name: ✅ Build Status
    runs-on: ubuntu-latest
    needs: lint
    if: always()
    steps:
      - name: Report status
        run: |
          if [ "${{ needs.lint.result }}" = "success" ]; then
            echo "✅ All checks passed! Ready to deploy."
          else
            echo "❌ Checks failed. Please fix before merging."
            exit 1
          fi
