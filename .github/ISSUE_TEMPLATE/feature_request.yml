name: ✨ Feature Request
description: Usulkan fitur atau peningkatan baru
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Terima kasih atas idenya! Isi form ini dengan detail agar tim bisa mendiskusikan dan mempertimbangkannya.

  - type: textarea
    id: problem
    attributes:
      label: 🤔 Masalah yang Ingin Diselesaikan
      description: Apakah ada masalah yang membuat kamu mengusulkan fitur ini?
      placeholder: "Contoh: Saya selalu kesulitan ketika ingin menghubungi tim karena tidak ada live chat"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Solusi yang Diusulkan
      description: Jelaskan fitur yang ingin kamu tambahkan
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatif yang Sudah Dipertimbangkan
      description: Apakah ada solusi lain yang sudah kamu pikirkan?

  - type: dropdown
    id: priority
    attributes:
      label: 🎯 Prioritas
      options:
        - Tinggi — blocking / sangat dibutuhkan
        - Sedang — penting tapi bisa ditunda
        - Rendah — nice to have

  - type: textarea
    id: additional
    attributes:
      label: 📌 Informasi Tambahan
      description: Referensi, mockup, atau contoh dari website lain
